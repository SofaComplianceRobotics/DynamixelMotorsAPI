name: Scrape Dynamixel Motors ⛏

on:
  push:
    paths:
      - 'data/projects.json'       # runs when you update the URL list
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Scraping Dynamixel website
        run: |
          python scraper.py

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dynamixelmotorsapi/dynamixel_configs.json
          git diff --staged --quiet || git commit -m "chore: refresh motors"
          git push
